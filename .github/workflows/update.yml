name: Update V2ray/Turkmenistan Configs

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache dependencies to speed up the workflow
      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Files/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybase64 requests
          # If you have a requirements.txt, use: pip install -r Files/requirements.txt

      - name: Prepare output directories
        run: mkdir -p Base64 Splitted-By-Protocol Output

      - name: Execute Python Scripts
        working-directory: Files
        run: |
          # We skip manual venv creation as GitHub Actions environments are already isolated
          python app.py
          python sort.py
          python check_tm.py
        env:
          PYTHONPATH: .

      - name: Commit & Push changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: "GitHub Action Bot"
          author_email: "actions@github.com"
          message: "Auto-update: Turkmenistan configs $(date +'%Y-%m-%d %H:%M')"
          add: "."
          
